name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build

  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: copilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d copilot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -e "apps/api[dev]"
      - run: ruff check apps/api/app apps/api/tests
      - run: pytest apps/api/tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/copilot
          ALLOW_ANONYMOUS_DEMO: "true"
