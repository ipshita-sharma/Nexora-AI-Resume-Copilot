services:
  - type: web
    name: career-copilot-api
    env: python
    region: oregon
    rootDir: apps/api
    buildCommand: pip install -e .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: BACKEND_CORS_ORIGINS
        value: https://your-vercel-domain.vercel.app
      - key: AI_PROVIDER
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
